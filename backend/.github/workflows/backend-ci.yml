name: Backend CI

on:
  push:
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"

jobs:
  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate
      - name: Prisma Validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build