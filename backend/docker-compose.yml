version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-postgres

    restart: always

    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: ai-redis

    ports:
      - "6379:6379"

    restart: always

  backend:
    build: ./backend

    ports:
      - "5000:5000"

    depends_on:
      - postgres
      - redis

    env_file:
      - ./backend/.env

volumes:
  postgres_data: